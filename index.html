<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MERL Sphere Viewer</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <canvas id="glCanvas" aria-label="MERL BRDF sphere renderer"></canvas>

    <main class="panel" aria-label="MERL controls">
      <header class="panel__header">
        <div>
          <p class="eyebrow">MERL</p>
          <h1>Sphere Viewer</h1>
        </div>
        <div class="status-dot" id="statusDot" aria-hidden="true"></div>
      </header>

      <label class="field">
        <span>Material</span>
        <select id="materialSelect"></select>
      </label>

      <div class="field">
        <span>Light</span>
        <div class="segmented" role="tablist" aria-label="Light mode">
          <button id="envMode" type="button" class="is-active" data-mode="env">Env</button>
          <button id="pointMode" type="button" data-mode="point">Point</button>
        </div>
      </div>

      <section id="envControls" class="control-group">
        <div class="file-field">
          <span>Env map</span>
          <div class="file-control">
            <label class="file-button" for="envUpload">Replace</label>
            <span id="envSource">Loading default</span>
            <input id="envUpload" class="visually-hidden" type="file" accept="image/*" />
          </div>
        </div>
        <label class="range-field">
          <span>Env intensity</span>
          <input id="envIntensity" type="range" min="0" max="8" step="0.05" value="0.35" />
        </label>
        <label class="range-field">
          <span>Env quality</span>
          <select id="envQuality">
            <option value="1">Fast</option>
            <option value="2" selected>Balanced</option>
            <option value="4">High</option>
          </select>
        </label>
      </section>

      <section id="pointControls" class="control-group is-hidden">
        <label class="range-field">
          <span>Azimuth</span>
          <input id="lightAzimuth" type="range" min="-180" max="180" step="1" value="38" />
        </label>
        <label class="range-field">
          <span>Elevation</span>
          <input id="lightElevation" type="range" min="-10" max="80" step="1" value="38" />
        </label>
        <label class="range-field">
          <span>Distance</span>
          <input id="lightDistance" type="range" min="1.8" max="6" step="0.05" value="3.2" />
        </label>
        <label class="range-field">
          <span>Intensity</span>
          <input id="pointIntensity" type="range" min="0" max="80" step="0.5" value="32" />
        </label>
      </section>

      <label class="range-field">
        <span>Exposure</span>
        <input id="exposure" type="range" min="0.2" max="8" step="0.05" value="1.15" />
      </label>
    </main>

    <div id="lightMarker" class="light-marker" aria-hidden="true"></div>
    <div id="status" class="status" role="status">Loading materials</div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
